<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Trip go go · Matsumoto + Azumino</title>
  <style>
    :root {
      --bg-primary: #faf9f5;
      --bg-dark: #2a1215;
      --color-error: #ff8a80;
      --color-text-muted: #666;
      --color-text-light: #999;
      --border-error: #5c2b2;
      --z-loading: 9999;
      --loading-offset: 20px;
      --error-offset: 12px;
      --font-system: -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: ui-monospace, monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--font-system);
    }

    #__bundler_loading {
      position: fixed;
      bottom: var(--loading-offset);
      right: var(--loading-offset);
      font: 13px/1.4 var(--font-system);
      color: var(--color-text-muted);
      background: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    #__bundler_err {
      position: fixed;
      bottom: var(--error-offset);
      left: var(--error-offset);
      right: var(--error-offset);
      font: 12px/1.4 var(--font-mono);
      background: var(--bg-dark);
      color: var(--color-error);
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-error);
      max-height: 200px;
      overflow-y: auto;
    }

    #__bundler_thumbnail {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      z-index: var(--z-loading);
    }

    #__bundler_thumbnail svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #__bundler_placeholder {
      color: var(--color-text-light);
      font-size: 14px;
    }
  </style>
  
  <noscript>
    <style>
      #__bundler_loading { display: none; }
    </style>
    <div style="position: fixed; bottom: 12px; left: 12px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #999; background: rgba(255, 255, 255, 0.9); padding: 6px 12px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);">
      This page requires JavaScript to display.
    </div>
  </noscript>
</head>

<body>
  <div id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#34472f"></rect>
      <circle cx="50" cy="50" r="20" fill="#d16a42"></circle>
      <path d="M50 40 L60 60 L40 60 Z" fill="#fffaf1"></path>
    </svg>
  </div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>
    /**
     * Bundle unpacker: decodes base64-encoded, optionally gzip-compressed assets,
     * creates blob URLs, and injects them into the template before parsing.
     */
    document.addEventListener('DOMContentLoaded', async function() {
      const loading = document.getElementById('__bundler_loading');
      const MAX_ERROR_MESSAGES = 10;
      const UNPACK_TIMEOUT_MS = 30000;

      /**
       * Update the loading status message
       */
      function setStatus(msg) {
        if (loading) loading.textContent = msg;
      }

      /**
       * Append an error message with a cap on total messages
       */
      function appendError(errorMsg) {
        let errorDiv = document.getElementById('__bundler_err');
        if (!errorDiv) {
          const container = document.body || document.documentElement;
          errorDiv = container.appendChild(document.createElement('div'));
          errorDiv.id = '__bundler_err';
        }

        const lines = (errorDiv.textContent || '')
          .split('\n')
          .filter(line => line.trim());
        
        // Keep only the last MAX_ERROR_MESSAGES
        lines.push('[bundle] ' + errorMsg);
        if (lines.length > MAX_ERROR_MESSAGES) {
          lines.shift();
        }

        errorDiv.textContent = lines.join('\n');
      }

      // Global error handler for runtime exceptions
      window.addEventListener('error', function(e) {
        const msg = (e.message || e.type) +
          (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
        appendError(msg);
      }, true);

      try {
        const timeoutPromise = new Promise((_, reject) =>
          setTimeout(() => reject(new Error('Bundle unpack timeout')), UNPACK_TIMEOUT_MS)
        );

        await Promise.race([unpackBundle(), timeoutPromise]);
      } catch (err) {
        setStatus('Error unpacking: ' + err.message);
        appendError('Unpack failed: ' + err.message);
        console.error('Bundle unpack error:', err);
      }

      /**
       * Main unpacking logic
       */
      async function unpackBundle() {
        const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
        const templateEl = document.querySelector('script[type="__bundler/template"]');

        if (!manifestEl || !templateEl) {
          throw new Error('Missing bundle data (manifest or template script tag)');
        }

        let manifest, template;
        try {
          manifest = JSON.parse(manifestEl.textContent);
          template = JSON.parse(templateEl.textContent);
        } catch (err) {
          throw new Error('Invalid bundle JSON: ' + err.message);
        }

        const uuids = Object.keys(manifest);
        setStatus('Unpacking ' + uuids.length + ' assets...');

        // Decode all assets in parallel
        const blobUrls = await decodeAssets(manifest, uuids);

        // Build resource map from ext_resources
        const resourceMap = buildResourceMap(blobUrls);

        // Substitute UUIDs in template
        setStatus('Rendering...');
        for (const uuid of uuids) {
          template = template.split(uuid).join(blobUrls[uuid]);
        }

        // Remove SRI/crossorigin attributes that conflict with blob:// URLs
        template = template
          .replace(/\s+integrity="[^"]*"/gi, '')
          .replace(/\s+crossorigin="[^"]*"/gi, '');

        // Inject resource map into template
        injectResourceScript(template, resourceMap);
      }

      /**
       * Decode base64 and optionally decompress assets
       */
      async function decodeAssets(manifest, uuids) {
        const blobUrls = {};

        await Promise.all(uuids.map(async (uuid) => {
          const entry = manifest[uuid];
          try {
            let finalBytes = decodeBase64(entry.data);

            if (entry.compressed) {
              finalBytes = await decompressGzip(finalBytes, uuid);
            }

            blobUrls[uuid] = URL.createObjectURL(
              new Blob([finalBytes], { type: entry.mime })
            );
          } catch (err) {
            console.error('Failed to decode asset ' + uuid + ':', err);
            // Fall back to empty blob
            blobUrls[uuid] = URL.createObjectURL(
              new Blob([], { type: entry.mime })
            );
          }
        }));

        return blobUrls;
      }

      /**
       * Decode a base64 string to Uint8Array
       */
      function decodeBase64(b64) {
        const binaryStr = atob(b64);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) {
          bytes[i] = binaryStr.charCodeAt(i);
        }
        return bytes;
      }

      /**
       * Decompress gzip-compressed bytes using DecompressionStream (if available)
       */
      async function decompressGzip(bytes, uuid) {
        if (typeof DecompressionStream === 'undefined') {
          console.warn(
            'DecompressionStream not available; asset ' + uuid + ' may not render correctly'
          );
          return bytes;
        }

        try {
          const ds = new DecompressionStream('gzip');
          const writer = ds.writable.getWriter();
          const reader = ds.readable.getReader();

          writer.write(bytes);
          await writer.close();

          const chunks = [];
          let totalLen = 0;
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            totalLen += value.length;
          }

          const finalBytes = new Uint8Array(totalLen);
          let offset = 0;
          for (const chunk of chunks) {
            finalBytes.set(chunk, offset);
            offset += chunk.length;
          }

          return finalBytes;
        } catch (err) {
          console.warn('Decompression failed for asset ' + uuid + ':', err);
          return bytes;
        }
      }

      /**
       * Build resource map from ext_resources script tag
       */
      function buildResourceMap(blobUrls) {
        const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
        const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
        const resourceMap = {};

        for (const entry of extResources) {
          if (blobUrls[entry.uuid]) {
            resourceMap[entry.id] = blobUrls[entry.uuid];
          }
        }

        return resourceMap;
      }

      /**
       * Inject window.__resources into the template after <head>
       */
      function injectResourceScript(template, resourceMap) {
        const resourceScript = '<script>window.__resources = ' +
          JSON.stringify(resourceMap)
            .split('</' + 'script>')
            .join('<\\/' + 'script>') +
          ';</' + 'script>';

        const headOpen = template.match(/<head[^>]*>/i);
        if (headOpen) {
          const i = headOpen.index + headOpen[0].length;
          const finalTemplate = template.slice(0, i) + resourceScript + template.slice(i);
          parseAndSwapDocument(finalTemplate);
        } else {
          throw new Error('Template missing <head> tag');
        }
      }

      /**
       * Parse template HTML and swap the document root, re-executing scripts
       */
      async function parseAndSwapDocument(template) {
        const doc = new DOMParser().parseFromString(template, 'text/html');
        document.documentElement.replaceWith(doc.documentElement);

        // Re-execute scripts (DOMParser scripts are inert)
        const dead = Array.from(document.scripts);
        for (const old of dead) {
          const s = document.createElement('script');
          for (const a of old.attributes) {
            s.setAttribute(a.name, a.value);
          }
          s.textContent = old.textContent;

          // For text/babel scripts with src, inline the fetched code
          if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
            try {
              const r = await fetch(s.src);
              s.textContent = await r.text();
              s.removeAttribute('src');
            } catch (err) {
              console.error('Failed to fetch babel script: ' + s.src, err);
            }
          }

          // Wait for external scripts to load
          const p = s.src
            ? new Promise(function(r) { s.onload = s.onerror = r; })
            : null;

          old.replaceWith(s);
          if (p) await p;
        }

        // Trigger Babel if present
        if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
          window.Babel.transformScriptTags();
        }
      }
    });
  </script>

  <script type="__bundler/manifest">
    {"d7081a43-bc5b-45e9-a74e-012100624bd2":{"mime":"text/javascript","compressed":true,"data":"H4sIAAAAAAAAE+y9a3sbuZEw+l2/ou03E1I2RY09m71I0TiyJCfa2JZWkmc2x/Ertcim1DHZzXSTlpWJ//upK1BAd1Oyx7ObPWf5zFhkN1AA"}}
  </script>

  <script type="__bundler/template">
    {}
  </script>

  <script type="__bundler/ext_resources">
    []
  </script>
</body>
</html>
